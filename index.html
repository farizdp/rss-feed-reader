<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pressroom — RSS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,900;1,9..144,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div id="app">
  <!-- TOP BAR -->
  <header class="topbar">
    <h1 class="brand" id="brand">Press<span class="ity">room</span></h1>
    <div class="topbar-tools">
      <button class="refresh-btn" id="refreshBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        <span id="refreshLabel" data-i18n="refresh">Segarkan</span>
      </button>
    </div>
  </header>

  <div class="subheader">
    <button class="hamburger" id="hamburger" aria-label="Menu"><span></span></button>
    <button class="collapse-btn" id="collapseBtn" aria-label="Sembunyikan panel" title="Sembunyikan panel samping">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="1"/><line x1="9" y1="4" x2="9" y2="20"/></svg>
    </button>
    <div class="chiprow" id="chiprow"></div>
  </div>

  <div class="body-wrap">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sb-scroll">
        <div class="sb-section-label meta" data-i18n="views">Tampilan</div>
        <div id="smartViews"></div>
        <div class="sb-section-label spaced meta">
          <span data-i18n="categories">Kategori</span>
          <button class="sb-mini-add" id="addCatBtn" data-i18n="new_short">+ Baru</button>
        </div>
        <div id="catList"></div>
      </div>
      <div class="sidebar-foot">
        <div class="control-group sidebar-cg" id="topTools" role="group" aria-label="Language">
          <button type="button" class="cg-btn lang on" data-lang="id">ID</button>
          <button type="button" class="cg-btn lang" data-lang="en">EN</button>
        </div>
        <button type="button" class="icon-btn theme-sb" id="themeBtn" aria-label="Toggle theme" title="Mode gelap">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </aside>

    <!-- MAIN CANVAS -->
    <main class="canvas" id="canvas">
      <div class="canvas-head">
        <div>
          <h2 class="canvas-title" id="canvasTitle">Semua Cerita</h2>
          <div class="canvas-sub meta" id="canvasSub"></div>
        </div>
      </div>
      <hr class="canvas-rule" />
      <div id="content"></div>
    </main>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fab" aria-label="Tambah feed">+</button>

<!-- READER -->
<div class="scrim" id="readerScrim"></div>
<section class="reader" id="reader" aria-hidden="true">
  <div class="reader-bar">
    <button class="icon-btn star" id="readerStar" aria-label="Bintangi">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
    </button>
    <div class="rb-spacer"></div>
    <button class="icon-btn" id="readerClose" aria-label="Tutup">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <div class="reader-scroll" id="readerScroll"></div>
</section>

<!-- ADD/EDIT FEED MODAL -->
<div class="modal-wrap" id="feedModal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="feedModalTitle">Tambah Feed</h2>
      <button class="icon-btn" id="feedModalClose" aria-label="Tutup">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label class="meta" for="feedUrl" data-i18n="f_url">URL Feed RSS</label>
        <input type="url" id="feedUrl" placeholder="https://contoh.com/feed" autocomplete="off" />
        <div class="hint" data-i18n="f_url_hint">Tempel URL RSS/Atom, lalu kami validasi.</div>
      </div>
      <div id="previewSlot"></div>
      <div class="field">
        <label class="meta" for="feedName"><span data-i18n="f_name">Nama Kustom</span> <span style="text-transform:none;font-weight:400;color:var(--muted)" data-i18n="optional">(opsional)</span></label>
        <input type="text" id="feedName" placeholder="Otomatis dari feed" data-i18n-ph="f_name_ph" autocomplete="off" />
      </div>
      <div class="field">
        <label class="meta" for="feedCat" data-i18n="category">Kategori</label>
        <select id="feedCat"></select>
      </div>
      <div class="field hide" id="newCatField">
        <label class="meta" for="newCatName" data-i18n="f_newcat_name">Nama kategori baru</label>
        <input type="text" id="newCatName" placeholder="mis. Sains" data-i18n-ph="newcat_ph" autocomplete="off" />
        <div class="swatches" id="newCatSwatches" style="margin-top:12px"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn ghost" id="feedCancel" data-i18n="cancel">Batal</button>
      <button class="btn primary" id="feedSave" data-i18n="save_feed" disabled>Simpan Feed</button>
    </div>
  </div>
</div>

<!-- CATEGORY MODAL -->
<div class="modal-wrap" id="catModal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="catModalTitle">Kategori Baru</h2>
      <button class="icon-btn" id="catModalClose" aria-label="Tutup">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label class="meta" for="catName" data-i18n="name">Nama</label>
        <input type="text" id="catName" placeholder="mis. Politik" data-i18n-ph="cat_ph" autocomplete="off" />
      </div>
      <div class="field">
        <label class="meta" data-i18n="color">Warna</label>
        <div class="swatches" id="catSwatches"></div>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn danger hide" id="catDelete" data-i18n="delete">Hapus</button>
      <div style="flex:1"></div>
      <button class="btn ghost" id="catCancel" data-i18n="cancel">Batal</button>
      <button class="btn primary" id="catSave" data-i18n="save" disabled>Simpan</button>
    </div>
  </div>
</div>

<!-- context menu -->
<div class="ctx" id="ctxMenu"></div>
<!-- toast -->
<div class="toast" id="toast"></div>

<script src="app.js"></script>
</body>
</html>
